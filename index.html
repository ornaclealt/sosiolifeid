<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Portofolio Mahasiswa</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Quicksand -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f5f3ff;
            background-image: radial-gradient(#ddd6fe 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .float-cute { animation: floatUpDown 3s ease-in-out infinite; }
        @keyframes floatUpDown {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .input-cute {
            background-color: #f8fafc;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .input-cute:focus {
            background-color: #ffffff;
            border-color: #8b5cf6;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.2);
            outline: none;
        }
        .btn-jelly { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-jelly:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.4);
        }
        .btn-jelly:active { transform: scale(0.95); }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .pop-in {
            animation: popInBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: scale(0.5);
        }
        @keyframes popInBounce {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .sync-spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Calendar Styles */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #f1f5f9;
            border: 1px solid #f1f5f9;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .calendar-cell {
            background-color: white;
            min-height: 80px;
            padding: 4px;
            position: relative;
        }
        .calendar-header-cell {
            background-color: #f8fafc;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            padding: 8px 0;
        }
        .event-badge {
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 4px;
            margin-bottom: 2px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center">

    <!-- Navbar/Auth Status -->
    <div class="w-full max-w-7xl flex justify-end mb-4">
        <button id="loginBtn" onclick="loginWithGoogle()" class="btn-jelly bg-white text-violet-600 font-bold py-2 px-6 rounded-full shadow-lg border-2 border-violet-200 flex items-center gap-2">
            <i class="fa-brands fa-google"></i> Login untuk Mulai
        </button>
        <button id="reconnectBtn" onclick="loginWithGoogle()" class="hidden btn-jelly bg-amber-500 text-white font-bold py-2 px-6 rounded-full shadow-lg border-2 border-amber-400 items-center gap-2">
            <i class="fa-solid fa-link"></i> Hubungkan Ulang Drive
        </button>
        <div id="userInfo" class="hidden items-center gap-3 bg-white py-2 px-4 rounded-full shadow-lg border border-slate-100">
            <img id="userPhoto" src="" alt="User" class="w-8 h-8 rounded-full border-2 border-violet-200">
            <span id="userName" class="text-sm font-bold text-slate-700"></span>
            <button onclick="logout()" class="ml-2 text-red-500 hover:text-red-700 transition-colors" title="Logout">
                <i class="fa-solid fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD WRAPPER -->
    <div class="w-full max-w-7xl grid grid-cols-1 xl:grid-cols-12 gap-8 items-start relative opacity-50 pointer-events-none transition-opacity duration-300" id="mainDashboardContainer">
        
        <div id="syncBadge" class="hidden absolute -top-6 right-4 md:right-8 bg-violet-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg items-center gap-2 z-50 transition-all duration-300">
            <i class="fa-solid fa-arrows-rotate sync-spin"></i> Menyinkronkan Drive...
        </div>

        <!-- KOLOM KIRI: FORMULIR INPUT (Tetap Lebar) -->
        <div class="xl:col-span-4 space-y-6">
            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden relative z-10">
                <div class="bg-violet-600 pt-8 pb-10 px-6 text-white text-center relative overflow-hidden">
                    <div class="absolute top-2 right-4 w-16 h-16 bg-white rounded-full opacity-10 float-cute"></div>
                    <div class="absolute bottom-2 left-6 w-10 h-10 bg-white rounded-full opacity-10 float-cute" style="animation-delay: 1s;"></div>
                    
                    <div class="float-cute mb-2 relative z-10 inline-block">
                        <div class="bg-white text-violet-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto shadow-lg border-4 border-violet-300">
                            <i class="fa-solid fa-graduation-cap text-3xl mb-1"></i>
                        </div>
                    </div>
                    <h1 class="text-2xl font-extrabold mb-1 tracking-tight">Tracker Portofolio</h1>
                    <p class="text-violet-200 text-sm font-medium">Rekam jejak prestasimu!</p>
                    
                    <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">
                        <svg viewBox="0 0 1200 120" preserveAspectRatio="none" class="relative block w-full h-6" style="transform: rotate(180deg);">
                            <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" fill="#ffffff"></path>
                        </svg>
                    </div>
                </div>

                <div class="px-6 pb-8 pt-4 text-slate-700 bg-white">
                    <form id="activityForm" class="space-y-4">
                        <div class="group">
                            <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Nama Aktivitas</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:-translate-y-1">
                                    <i class="fa-solid fa-rocket text-slate-300 group-focus-within:text-violet-500 transition-colors"></i>
                                </div>
                                <input type="text" id="nama" required class="input-cute w-full pl-10 pr-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 placeholder-slate-300" placeholder="Contoh: Panitia OSPEK Univ">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Kategori</label>
                                <select id="kategori" required class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 appearance-none cursor-pointer">
                                    <option value="" disabled selected>Pilih...</option>
                                    <option value="Volunteer">🤝 Volunteer</option>
                                    <option value="Kepanitiaan">📋 Kepanitiaan</option>
                                    <option value="Magang">💼 Magang</option>
                                    <option value="Lomba">🏆 Lomba</option>
                                    <option value="Penelitian">🔬 Penelitian</option>
                                    <option value="Organisasi">👥 Organisasi</option>
                                    <option value="Pelatihan">📜 Pelatihan</option>
                                    <option value="Pertukaran">✈️ Pertukaran</option>
                                </select>
                            </div>
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Semester</label>
                                <select id="semester" required class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 appearance-none cursor-pointer">
                                    <option value="" disabled selected>Pilih...</option>
                                    <option value="Semester 1">Semester 1</option>
                                    <option value="Semester 2">Semester 2</option>
                                    <option value="Semester 3">Semester 3</option>
                                    <option value="Semester 4">Semester 4</option>
                                    <option value="Semester 5">Semester 5</option>
                                    <option value="Semester 6">Semester 6</option>
                                    <option value="Semester 7">Semester 7</option>
                                    <option value="Semester 8+">Semester 8+</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Tgl Pelaksanaan</label>
                                <input type="date" id="tglPelaksanaan" required class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 text-center">
                            </div>
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Tgl Deadline</label>
                                <input type="date" id="tglDeadline" required class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 text-center">
                            </div>
                        </div>

                        <div class="group">
                            <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Link Registrasi</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-transform group-focus-within:-translate-y-1">
                                    <i class="fa-solid fa-link text-slate-300 group-focus-within:text-violet-500 transition-colors"></i>
                                </div>
                                <input type="text" id="linkReg" required class="input-cute w-full pl-10 pr-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 placeholder-slate-300" placeholder="Link G-Form / Web">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Kategori Sosmed</label>
                                <select id="kategoriSosmed" class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 appearance-none cursor-pointer">
                                    <option value="" disabled selected>Pilih...</option>
                                    <option value="Instagram">Instagram</option>
                                    <option value="LinkedIn">LinkedIn</option>
                                    <option value="Twitter/X">Twitter/X</option>
                                    <option value="TikTok">TikTok</option>
                                    <option value="Website">Website</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                            <div class="group">
                                <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider ml-2">Username/Link Sosmed</label>
                                <input type="text" id="linkSosmed" class="input-cute w-full px-4 py-2.5 rounded-xl text-sm font-bold text-slate-700 placeholder-slate-300" placeholder="@username">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-jelly w-full bg-violet-600 text-white font-bold py-3.5 px-6 rounded-[1rem] mt-2 flex justify-center items-center gap-2 relative overflow-hidden shadow-lg shadow-violet-500/40">
                            <span id="btnText" class="flex items-center gap-2 relative z-10">
                                <i id="btnIcon" class="fa-solid fa-plus-circle"></i> Tambah Portofolio
                            </span>
                        </button>
                    </form>

                    <div id="statusMessage" class="hidden mt-4 rounded-xl overflow-hidden"></div>
                    <div id="sheetLinkContainer" class="hidden mt-4 text-center">
                        <a href="#" id="sheetLink" target="_blank" class="text-xs font-bold text-violet-500 hover:text-violet-700 transition-colors underline decoration-dotted underline-offset-4">
                            <i class="fa-solid fa-table"></i> Buka Spreadsheet Saya
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- KOLOM KANAN: DASHBOARD WIDGETS & GRAFIK -->
        <div class="xl:col-span-8 space-y-6">
            
            <!-- WIDGETS ATAS (Hari Ini & Aktivitas Terdekat) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Kartu Hari Ini -->
                <div class="bg-gradient-to-br from-indigo-500 to-violet-600 rounded-[2rem] p-6 shadow-xl text-white relative overflow-hidden flex items-center gap-5">
                    <div class="absolute -right-6 -top-6 text-white opacity-10 text-8xl"><i class="fa-solid fa-calendar-day"></i></div>
                    <div class="bg-white/20 w-16 h-16 rounded-2xl flex items-center justify-center text-3xl backdrop-blur-sm shadow-inner z-10">
                        <i class="fa-solid fa-calendar-check"></i>
                    </div>
                    <div class="z-10">
                        <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest mb-1">Hari Ini</p>
                        <h3 id="txtHariIni" class="text-xl font-extrabold">-</h3>
                    </div>
                </div>

                <!-- Kartu Aktivitas Terdekat -->
                <div class="glass-card rounded-[2rem] p-6 shadow-xl relative overflow-hidden border-2 border-blue-100 flex items-center gap-5">
                    <div class="absolute -right-4 -bottom-4 text-blue-500 opacity-5 text-8xl"><i class="fa-solid fa-stopwatch"></i></div>
                    <div class="bg-blue-500 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-blue-500/30 z-10">
                        <i class="fa-solid fa-bell animate-bounce"></i>
                    </div>
                    <div class="z-10">
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Aktivitas Terdekat</p>
                        <h3 id="txtAktivitasTerdekat" class="text-xl font-extrabold text-slate-800 truncate max-w-[200px]">Belum Ada</h3>
                        <div id="badgeHMin" class="mt-2 inline-block px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg border border-blue-100">-</div>
                    </div>
                </div>
            </div>

            <!-- KALENDER KESIBUKAN -->
            <div class="glass-card rounded-[2rem] p-6 shadow-xl">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-rose-100 text-rose-500 w-10 h-10 rounded-xl flex items-center justify-center text-lg">
                            <i class="fa-solid fa-calendar-days"></i>
                        </div>
                        <div>
                            <h2 class="text-xl font-extrabold text-slate-800 leading-tight">Kalender Kesibukan</h2>
                            <p class="text-slate-400 text-[11px] font-bold">Pantau jadwal pelaksanaan & deadline-mu</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-lg hover:bg-white hover:shadow text-slate-600 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="calMonthYear" class="font-bold text-slate-700 w-28 text-center text-sm">Bulan Tahun</span>
                        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-lg hover:bg-white hover:shadow text-slate-600 transition-all"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                
                <div class="calendar-grid text-sm" id="calendarBody">
                    <!-- Header Hari akan dirender via JS -->
                </div>
            </div>

            <!-- CHART WIDGET -->
            <div class="glass-card rounded-[2rem] p-6 shadow-xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 class="text-xl font-extrabold text-slate-800">Performa Semester</h2>
                    </div>
                    <div class="bg-violet-100 text-violet-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-chart-simple"></i>
                    </div>
                </div>
                <div class="relative h-56 w-full">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card rounded-3xl p-4 shadow-lg flex items-center gap-4">
                    <div class="bg-emerald-100 text-emerald-600 w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-trophy"></i>
                    </div>
                    <div>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wide">Total Aktivitas</p>
                        <p id="totalAktivitas" class="text-xl font-extrabold text-slate-800">0</p>
                    </div>
                </div>
                <div class="glass-card rounded-3xl p-4 shadow-lg flex items-center gap-4">
                    <div class="bg-amber-100 text-amber-600 w-10 h-10 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-fire"></i>
                    </div>
                    <div>
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wide">Paling Aktif</p>
                        <p id="semesterTeraktif" class="text-sm font-extrabold text-slate-800">-</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- PEMBERITAHUAN (Toast) -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <i class="fa-solid fa-info-circle text-violet-400"></i>
        <span id="toastMessage" class="font-medium text-sm"></span>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA2matP-r5rOBdZDFORc5triVTfRhM_4JM",
            authDomain: "sosiolifeid.firebaseapp.com",
            projectId: "sosiolifeid",
            storageBucket: "sosiolifeid.firebasestorage.app",
            messagingSenderId: "441151079469",
            appId: "1:441151079469:web:a2a19938cdabc0fc6ce4a4"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        provider.addScope('https://www.googleapis.com/auth/spreadsheets');
        provider.addScope('https://www.googleapis.com/auth/drive.file');
        provider.setCustomParameters({
            'client_id': '267807089762-rag2i6u8gumjodhavunqcammnll7l5p1.apps.googleusercontent.com',
            'prompt': 'consent'
        });

        // --- VARIABEL GLOBAL ---
        let userAccessToken = sessionStorage.getItem('googleApiToken'); 
        let userSpreadsheetId = null;
        let activities = [];
        let myChart = null;

        // Variabel Kalender
        let currentCalDate = new Date(); // Hari ini berdasarkan waktu lokal sistem
        
        const categoryColors = {
            'Volunteer': '#10b981', 'Kepanitiaan': '#3b82f6', 'Magang': '#8b5cf6', 
            'Lomba': '#f59e0b', 'Penelitian': '#ef4444', 'Organisasi': '#06b6d4', 
            'Pelatihan': '#ec4899', 'Pertukaran': '#f97316'
        };

        const mainDashboardContainer = document.getElementById('mainDashboardContainer');
        const loginBtn = document.getElementById('loginBtn');
        const reconnectBtn = document.getElementById('reconnectBtn');
        const userInfo = document.getElementById('userInfo');
        const syncBadge = document.getElementById('syncBadge');

        // --- INIT HARI INI WIDGET ---
        function initHariIni() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('txtHariIni').innerText = today.toLocaleDateString('id-ID', options);
        }
        initHariIni();

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.querySelector('i').className = isError ? 'fa-solid fa-triangle-exclamation text-red-400' : 'fa-solid fa-info-circle text-violet-400';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 6000); 
        }

        // --- AUTH STATE LISTENER ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName.split(' ')[0];
                
                userSpreadsheetId = localStorage.getItem(`sheetId_${user.uid}`);
                
                if (userAccessToken) {
                    loginBtn.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                    userInfo.classList.add('flex');
                    reconnectBtn.classList.add('hidden');
                    reconnectBtn.classList.remove('flex');
                    mainDashboardContainer.classList.remove('opacity-50', 'pointer-events-none');
                    
                    if (userSpreadsheetId) {
                       await fetchActivitiesFromSheet();
                    } else {
                        await createInitialSpreadsheet(user.uid);
                    }
                } else {
                    loginBtn.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                    userInfo.classList.add('flex');
                    reconnectBtn.classList.remove('hidden');
                    reconnectBtn.classList.add('flex');
                    mainDashboardContainer.classList.add('opacity-50', 'pointer-events-none');
                }
            } else {
                loginBtn.classList.remove('hidden');
                reconnectBtn.classList.add('hidden');
                reconnectBtn.classList.remove('flex');
                userInfo.classList.add('hidden');
                userInfo.classList.remove('flex');
                mainDashboardContainer.classList.add('opacity-50', 'pointer-events-none');
                
                userAccessToken = null;
                sessionStorage.removeItem('googleApiToken');
                userSpreadsheetId = null;
                activities = [];
                updateDashboard();
                renderCalendar();
                document.getElementById('sheetLinkContainer').classList.add('hidden');
            }
        });

        // --- FUNGSI LOGIN ---
        async function loginWithGoogle() {
            try {
                loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Login...';
                reconnectBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menghubungkan...';
                
                const result = await auth.signInWithPopup(provider);
                userAccessToken = result.credential.accessToken;
                sessionStorage.setItem('googleApiToken', userAccessToken);
                
                showToast("Berhasil terhubung! Mengambil data...");
                
                const user = result.user;
                userSpreadsheetId = localStorage.getItem(`sheetId_${user.uid}`);
                
                loginBtn.classList.add('hidden');
                reconnectBtn.classList.add('hidden');
                reconnectBtn.classList.remove('flex');
                userInfo.classList.remove('hidden');
                userInfo.classList.add('flex');
                document.getElementById('userPhoto').src = user.photoURL;
                document.getElementById('userName').innerText = user.displayName.split(' ')[0];
                mainDashboardContainer.classList.remove('opacity-50', 'pointer-events-none');
                
                if (userSpreadsheetId) {
                    await fetchActivitiesFromSheet();
                } else {
                    await createInitialSpreadsheet(user.uid);
                }
                
                loginBtn.innerHTML = '<i class="fa-brands fa-google"></i> Login untuk Mulai';
                reconnectBtn.innerHTML = '<i class="fa-solid fa-link"></i> Hubungkan Ulang Drive';
                
            } catch (error) {
                console.error("Error saat login:", error);
                loginBtn.innerHTML = '<i class="fa-brands fa-google"></i> Login untuk Mulai';
                reconnectBtn.innerHTML = '<i class="fa-solid fa-link"></i> Hubungkan Ulang Drive';
                showToast(error.message, true);
            }
        }

        function logout() {
            auth.signOut().then(() => {
                showToast("Berhasil logout.");
                sessionStorage.removeItem('googleApiToken');
            }).catch((error) => {
                showToast("Gagal logout.", true);
            });
        }

        // --- FUNGSI: MEMBUAT & FORMAT SPREADSHEET (SIHIR BARU!) ---
        async function createInitialSpreadsheet(uid) {
            syncBadge.innerHTML = '<i class="fa-solid fa-arrows-rotate sync-spin"></i> Membuat Database...';
            syncBadge.classList.remove('hidden');
            syncBadge.classList.add('flex');

            try {
                // 1. Buat File Baru
                const response = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${userAccessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        properties: { title: "Tracker_Portofolio_Mahasiswa_Data" }
                    })
                });
                
                if (!response.ok) throw new Error("Gagal membuat Spreadsheet");
                const data = await response.json();
                userSpreadsheetId = data.spreadsheetId;
                localStorage.setItem(`sheetId_${uid}`, userSpreadsheetId);

                // 2. Isi Header Baru
                const headerValues = [
                    ["ID", "Timestamp", "Nama Aktivitas", "Kategori", "Semester", "Tgl Pelaksanaan", "Tgl Deadline", "Link Registrasi", "Info Sosmed", "Kategori Sosmed"]
                ];
                await appendToSheet(headerValues);

                // 3. ATUR FORMAT TAMPILAN SPREADSHEET (Times New Roman, Bold, Kuning, Lebar Kolom)
                const formatPayload = {
                    requests: [
                        // Format seluruh sheet: Times New Roman 12, Rata Kiri
                        {
                            repeatCell: {
                                range: { sheetId: 0 }, // Berlaku untuk Sheet1
                                cell: {
                                    userEnteredFormat: {
                                        textFormat: { fontFamily: 'Times New Roman', fontSize: 12 },
                                        horizontalAlignment: 'LEFT'
                                    }
                                },
                                fields: 'userEnteredFormat(textFormat,horizontalAlignment)'
                            }
                        },
                        // Format Baris Header (Baris ke-1): Background Kuning, Font Tebal
                        {
                            repeatCell: {
                                range: { sheetId: 0, startRowIndex: 0, endRowIndex: 1 },
                                cell: {
                                    userEnteredFormat: {
                                        backgroundColor: { red: 1, green: 1, blue: 0 }, // Warna Kuning
                                        textFormat: { bold: true, fontFamily: 'Times New Roman', fontSize: 12 },
                                        horizontalAlignment: 'LEFT'
                                    }
                                },
                                fields: 'userEnteredFormat(backgroundColor,textFormat,horizontalAlignment)'
                            }
                        },
                        // Atur Lebar Kolom Biar Rapi
                        {
                            updateDimensionProperties: {
                                range: { sheetId: 0, dimension: 'COLUMNS', startIndex: 0, endIndex: 10 },
                                properties: { pixelSize: 140 },
                                fields: 'pixelSize'
                            }
                        }
                    ]
                };

                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${userSpreadsheetId}:batchUpdate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${userAccessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formatPayload)
                });

                syncBadge.innerHTML = '<i class="fa-solid fa-check"></i> Database Siap!';
                syncBadge.classList.replace('bg-violet-600', 'bg-emerald-500');
                
                updateSheetLink();
                await fetchActivitiesFromSheet();

                setTimeout(() => {
                    syncBadge.classList.add('hidden');
                    syncBadge.classList.replace('bg-emerald-500', 'bg-violet-600');
                }, 3000);

            } catch (error) {
                console.error("Error membuat spreadsheet:", error);
                syncBadge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Gagal membuat Database';
                syncBadge.classList.replace('bg-violet-600', 'bg-red-500');
                showToast("Pesan Server Google: " + error.message, true);
            }
        }

        async function appendToSheet(valuesArray) {
            const range = 'Sheet1!A:J'; // Update range A sampai J
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${userSpreadsheetId}/values/${range}:append?valueInputOption=USER_ENTERED`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${userAccessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    majorDimension: "ROWS",
                    values: valuesArray
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Gagal menyimpan ke Spreadsheet");
            }
        }

        async function fetchActivitiesFromSheet() {
            if (!userSpreadsheetId || !userAccessToken) return;

            syncBadge.innerHTML = '<i class="fa-solid fa-arrows-rotate sync-spin"></i> Menyinkronkan...';
            syncBadge.classList.remove('hidden');
            syncBadge.classList.add('flex');

            try {
                const range = 'Sheet1!A2:J'; // Ambil data dari kolom A sampai J
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${userSpreadsheetId}/values/${range}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${userAccessToken}`
                    }
                });

                if (!response.ok) throw new Error("Gagal membaca Spreadsheet");

                const result = await response.json();
                activities = [];
                
                if (result.values && result.values.length > 0) {
                    activities = result.values.map(row => ({
                        id: row[0] || '',
                        timestamp: row[1] || '',
                        nama: row[2] || '',
                        kategori: row[3] || '',
                        semester: row[4] || '',
                        tglPelaksanaan: row[5] || '',
                        tglDeadline: row[6] || '',
                        linkReg: row[7] || '',
                        linkSosmed: row[8] || '',
                        kategoriSosmed: row[9] || ''
                    }));
                }

                updateDashboard();
                renderCalendar(); // Render ulang kalender setelah dapat data
                updateAktivitasTerdekat(); // Cek aktivitas paling dekat
                updateSheetLink();

                syncBadge.innerHTML = '<i class="fa-solid fa-check"></i> Tersinkronisasi';
                syncBadge.classList.replace('bg-violet-600', 'bg-emerald-500');
                setTimeout(() => {
                    syncBadge.classList.add('hidden');
                    syncBadge.classList.replace('bg-emerald-500', 'bg-violet-600');
                }, 2000);

            } catch (error) {
                console.error("Error fetching data:", error);
                syncBadge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Gagal Sinkron';
                syncBadge.classList.replace('bg-violet-600', 'bg-red-500');
                
                if (error.message.includes("Gagal membaca")) {
                    showToast("Sesi akses Drive kadaluarsa. Silakan klik 'Hubungkan Ulang Drive'.", true);
                    sessionStorage.removeItem('googleApiToken');
                    userAccessToken = null;
                    reconnectBtn.classList.remove('hidden');
                    reconnectBtn.classList.add('flex');
                    mainDashboardContainer.classList.add('opacity-50', 'pointer-events-none');
                }
            }
        }

        function updateSheetLink() {
            if (userSpreadsheetId) {
                const linkContainer = document.getElementById('sheetLinkContainer');
                const linkEl = document.getElementById('sheetLink');
                linkEl.href = `https://docs.google.com/spreadsheets/d/${userSpreadsheetId}/edit`;
                linkContainer.classList.remove('hidden');
            }
        }

        // --- ENGINE: AKTIVITAS TERDEKAT ---
        function updateAktivitasTerdekat() {
            const todayStr = new Date().toISOString().split('T')[0]; // Format YYYY-MM-DD lokal
            const txtAktivitas = document.getElementById('txtAktivitasTerdekat');
            const badgeHMin = document.getElementById('badgeHMin');
            
            // Filter aktivitas yang tglPelaksanaan atau tglDeadline >= hari ini
            const upcoming = activities.filter(act => {
                const dateToCheck = act.tglDeadline || act.tglPelaksanaan;
                return dateToCheck && dateToCheck >= todayStr;
            });

            if(upcoming.length === 0) {
                txtAktivitas.innerText = "Belum Ada Acara";
                badgeHMin.innerText = "Santai dulu!";
                badgeHMin.className = "mt-2 inline-block px-3 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg border border-slate-200";
                return;
            }

            // Urutkan berdasarkan tanggal terdekat
            upcoming.sort((a, b) => {
                const dateA = a.tglDeadline || a.tglPelaksanaan;
                const dateB = b.tglDeadline || b.tglPelaksanaan;
                return new Date(dateA) - new Date(dateB);
            });

            const closest = upcoming[0];
            const targetDateStr = closest.tglDeadline || closest.tglPelaksanaan;
            const targetDate = new Date(targetDateStr);
            
            // Hilangkan waktu pada objek hari ini agar selisih pas per hari
            const todayDateOnly = new Date(todayStr); 
            const diffTime = Math.abs(targetDate - todayDateOnly);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            const formatter = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short' });
            
            txtAktivitas.innerText = closest.nama;
            
            if(diffDays === 0) {
                badgeHMin.innerText = `HARI INI!`;
                badgeHMin.className = "mt-2 inline-block px-3 py-1 bg-rose-50 text-rose-600 text-xs font-bold rounded-lg border border-rose-200 animate-pulse";
            } else {
                badgeHMin.innerText = `H - ${diffDays} (${formatter.format(targetDate)})`;
                badgeHMin.className = "mt-2 inline-block px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg border border-blue-100";
            }
        }

        // --- ENGINE: KALENDER KESIBUKAN ---
        function changeMonth(step) {
            currentCalDate.setMonth(currentCalDate.getMonth() + step);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentCalDate.getFullYear();
            const month = currentCalDate.getMonth(); // 0-11
            
            // Update Text Header
            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('calMonthYear').innerText = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay(); // 0 (Sun) - 6 (Sat)
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const calBody = document.getElementById('calendarBody');
            let html = `
                <div class="calendar-header-cell rounded-tl-lg">Sun</div>
                <div class="calendar-header-cell">Mon</div>
                <div class="calendar-header-cell">Tue</div>
                <div class="calendar-header-cell">Wed</div>
                <div class="calendar-header-cell">Thu</div>
                <div class="calendar-header-cell">Fri</div>
                <div class="calendar-header-cell rounded-tr-lg">Sat</div>
            `;

            // Tanggal dari bulan sebelumnya
            for(let i = 0; i < firstDay; i++) {
                const prevDate = daysInPrevMonth - firstDay + i + 1;
                html += `<div class="calendar-cell bg-slate-50 text-slate-300 font-semibold p-2 text-right">${prevDate}</div>`;
            }

            // Tanggal bulan ini
            const todayStr = new Date().toISOString().split('T')[0];

            for(let i = 1; i <= daysInMonth; i++) {
                // Buat string YYYY-MM-DD
                const mStr = String(month + 1).padStart(2, '0');
                const dStr = String(i).padStart(2, '0');
                const dateStr = `${year}-${mStr}-${dStr}`;

                let isToday = (dateStr === todayStr) ? "bg-indigo-50 text-indigo-700 font-bold" : "text-slate-600 font-semibold";
                let eventsHtml = '';

                // Cari aktivitas di tanggal ini
                activities.forEach(act => {
                    // Cek event Pelaksanaan
                    if(act.tglPelaksanaan === dateStr) {
                        const bgCol = categoryColors[act.kategori] || '#3b82f6';
                        eventsHtml += `<span class="event-badge shadow-sm" style="background-color: ${bgCol};"><i class="fa-solid fa-flag text-[8px] mr-1"></i>${act.nama}</span>`;
                    }
                    // Cek event Deadline
                    if(act.tglDeadline === dateStr && act.tglDeadline !== act.tglPelaksanaan) {
                        eventsHtml += `<span class="event-badge bg-rose-500 shadow-sm"><i class="fa-solid fa-clock text-[8px] mr-1"></i>DL: ${act.nama}</span>`;
                    }
                });

                html += `
                    <div class="calendar-cell ${isToday} p-2 border-t border-slate-100 flex flex-col group hover:bg-slate-50 transition-colors">
                        <div class="text-right mb-1">${i}</div>
                        <div class="flex-1 overflow-y-auto max-h-[60px] scrollbar-hide">
                            ${eventsHtml}
                        </div>
                    </div>
                `;
            }

            // Tanggal dari bulan depan (opsional untuk menuhin grid)
            const totalCells = firstDay + daysInMonth;
            const remainingCells = (Math.ceil(totalCells / 7) * 7) - totalCells;
            for(let i = 1; i <= remainingCells; i++) {
                html += `<div class="calendar-cell bg-slate-50 text-slate-300 font-semibold p-2 text-right border-t border-slate-100">${i}</div>`;
            }

            calBody.innerHTML = html;
        }

        function updateDashboard() {
            document.getElementById('totalAktivitas').innerText = activities.length;
            
            if(activities.length === 0) {
                document.getElementById('semesterTeraktif').innerText = "-";
                if(myChart) { myChart.data.datasets = []; myChart.update(); }
                return;
            }

            const dataBySemester = {};
            const semesters = ['Semester 1', 'Semester 2', 'Semester 3', 'Semester 4', 'Semester 5', 'Semester 6', 'Semester 7', 'Semester 8+'];
            
            semesters.forEach(sem => { dataBySemester[sem] = {}; });
            let maxCount = 0; let topSemester = "-";

            activities.forEach(act => {
                if(act.semester && act.kategori && semesters.includes(act.semester)) {
                    if(!dataBySemester[act.semester]) dataBySemester[act.semester] = {};
                    if(!dataBySemester[act.semester][act.kategori]) dataBySemester[act.semester][act.kategori] = 0;
                    dataBySemester[act.semester][act.kategori]++;
                }
            });

            semesters.forEach(sem => {
                let totalSem = 0;
                for(let cat in dataBySemester[sem]) totalSem += dataBySemester[sem][cat];
                if(totalSem > maxCount) {
                    maxCount = totalSem; topSemester = sem;
                }
            });
            document.getElementById('semesterTeraktif').innerText = topSemester === "-" ? "-" : topSemester;

            const categoriesFound = [...new Set(activities.map(a => a.kategori).filter(Boolean))];
            const datasets = categoriesFound.map(cat => {
                return {
                    label: cat,
                    data: semesters.map(sem => dataBySemester[sem][cat] || 0),
                    backgroundColor: categoryColors[cat] || '#94a3b8',
                    borderRadius: 6, borderWidth: 0
                };
            });

            const ctx = document.getElementById('portfolioChart').getContext('2d');
            if(myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: semesters, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { family: 'Quicksand', weight: 'bold' } } },
                        tooltip: { mode: 'index', intersect: false, titleFont: { family: 'Quicksand' }, bodyFont: { family: 'Quicksand' } }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { font: { family: 'Quicksand', weight: '600' } } },
                        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1, font: { family: 'Quicksand', weight: '600' } } }
                    },
                    animation: { duration: 1000, easing: 'easeOutQuart' }
                }
            });
        }

        // --- SUBMIT DATA FORM KE SPREADSHEET ---
        const form = document.getElementById('activityForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!userAccessToken) {
                showToast("Sesi akses habis. Silakan klik tombol 'Hubungkan Ulang Drive' di atas!", true);
                return;
            }
            if (!userSpreadsheetId) {
                showToast("Database belum terbentuk. Pastikan kamu mencentang izin Google Drive saat Login.", true);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-violet-600', 'bg-violet-400');
            submitBtn.classList.remove('btn-jelly');
            submitBtn.classList.add('cursor-wait', 'scale-95');
            btnText.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-lg"></i> <span class="animate-pulse">Menyimpan...</span>';
            
            statusMessage.classList.add('hidden');
            statusMessage.classList.remove('pop-in');

            // Format Timestamp Rapi
            const now = new Date();
            const timestampStr = now.toLocaleString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second:'2-digit' });

            const newActivityRow = [
                Date.now().toString(),
                timestampStr, // Tambahan Timestamp sesuai gambar
                document.getElementById('nama').value,
                document.getElementById('kategori').value,
                document.getElementById('semester').value,
                document.getElementById('tglPelaksanaan').value,
                document.getElementById('tglDeadline').value,
                document.getElementById('linkReg').value,
                document.getElementById('linkSosmed').value,
                document.getElementById('kategoriSosmed').value || "" // Tambahan Kategori Sosmed
            ];

            try {
                await appendToSheet([newActivityRow]);
                form.reset();
                statusMessage.innerHTML = `
                    <div class="bg-violet-50 p-4 border border-violet-200 rounded-2xl flex items-center gap-3">
                        <div class="bg-violet-500 text-white rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center shadow-md">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-violet-800 text-sm">Tersimpan di Drive Kamu! 🎉</h3>
                            <p class="text-violet-600 text-xs font-medium">Memperbarui data dan kalender...</p>
                        </div>
                    </div>
                `;
                statusMessage.classList.remove('hidden');
                statusMessage.classList.add('pop-in', 'block');
                
                await fetchActivitiesFromSheet();
                
            } catch (error) {
                console.error('Error menyimpan!', error.message);
                statusMessage.innerHTML = `
                    <div class="bg-red-50 p-4 border border-red-200 rounded-2xl flex items-center gap-3">
                        <div class="bg-red-500 text-white rounded-full w-10 h-10 flex-shrink-0 flex items-center justify-center shadow-md">
                            <i class="fa-solid fa-bomb"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-red-800 text-sm">Yah, ada kendala..</h3>
                            <p class="text-red-600 text-xs font-medium">${error.message}</p>
                        </div>
                    </div>
                `;
                statusMessage.classList.remove('hidden');
                statusMessage.classList.add('pop-in', 'block');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-violet-400', 'bg-violet-600');
                submitBtn.classList.add('btn-jelly');
                submitBtn.classList.remove('cursor-wait', 'scale-95');
                btnText.innerHTML = '<i id="btnIcon" class="fa-solid fa-plus-circle"></i> Tambah Portofolio';
            }
        });

        // Initialize empty dashboard and calendar on load
        updateDashboard();
        renderCalendar();
    </script>
